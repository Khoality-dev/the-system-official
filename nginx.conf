# Static serving for the THE SYSTEM download/landing site (docs/).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The web root is the docs/ folder, which also holds repo/meta files —
    # never serve those (store-listing notes, compose, nginx.conf, dotfiles).
    location ~* \.(md|ya?ml|conf)$ { return 404; }
    location ~ /\.          { return 404; }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;

    # Long-cache immutable image assets; let HTML revalidate.
    location ~* \.(?:png|jpe?g|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # The APK itself is distributed via GitHub Releases, not from here — the download
    # button links straight to the latest release asset.

    location / {
        try_files $uri $uri/ =404;
    }
}
