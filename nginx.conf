# Static serving for the THE SYSTEM download/landing site (docs/).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The web root is the docs/ folder, which also holds repo/meta files —
    # never serve those (store-listing notes, compose, nginx.conf, dotfiles).
    location ~* \.(md|ya?ml|conf)$ { return 404; }
    location ~ /\.          { return 404; }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;

    # Long-cache immutable image assets; let HTML revalidate.
    location ~* \.(?:png|jpe?g|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Signed release APK for the own-site (direct download) channel. Delivered by the
    # release CI to the upload endpoint below and served from the apk_data volume
    # (aliased in, so it stays outside the read-only web root); overwritten each
    # release, so keep the cache short. Force the Android package MIME + a download
    # prompt (browsers otherwise mishandle .apk).
    location = /dl/the-system.apk {
        alias /srv/apk/the-system.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=300";
    }

    # Authenticated upload endpoint: the release CI PUTs the signed APK here and the
    # uploader sidecar (token-checked, then atomic write into apk_data) receives it.
    # Stream the ~25 MB body instead of buffering, and raise the body-size cap.
    location = /deploy/the-system.apk {
        proxy_pass http://apk-uploader:9000/;
        proxy_request_buffering off;
        client_max_body_size 200m;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
