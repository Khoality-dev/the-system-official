# THE SYSTEM — download/landing website (static).
# The public site is hosted on GitHub Pages; this compose file is only for serving
# the same static files locally or on your own box. The APK is NOT served here —
# it's distributed via GitHub Releases (github.com/Khoality-dev/the-system-official).
#
#   docker compose up -d        # then open http://localhost:8080
#   docker compose down
#
# The web root is this folder, mounted read-only; nginx.conf hides the repo/meta
# files (*.md, *.yml, *.conf, dotfiles).
services:
  website:
    image: nginx:1.27-alpine
    container_name: thesystem-website
    ports:
      - "${WEBSITE_PORT:-8080}:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
